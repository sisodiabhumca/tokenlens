apiVersion: v1
kind: Service
metadata: { name: tokenlens-cloud }
spec:
  selector: { app: tokenlens-cloud }
  ports: [{ port: 80, targetPort: 3000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: tokenlens-cloud }
spec:
  replicas: 2
  selector: { matchLabels: { app: tokenlens-cloud } }
  template:
    metadata: { labels: { app: tokenlens-cloud } }
    spec:
      containers:
        - name: cloud
          image: ghcr.io/sisodiabhumca/tokenlens-cloud:latest
          env:
            - { name: DATABASE_URL, valueFrom: { secretKeyRef: { name: tokenlens, key: DATABASE_URL } } }
            - { name: DATABASE_SSL, value: "false" }
            - { name: INGEST_TOKEN, valueFrom: { secretKeyRef: { name: tokenlens, key: INGEST_TOKEN } } }
            - { name: CRON_SECRET, valueFrom: { secretKeyRef: { name: tokenlens, key: CRON_SECRET } } }
          ports: [{ containerPort: 3000 }]
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
