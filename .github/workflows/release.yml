name: release
# Cargo-dist-driven release pipeline. Builds prebuilt binaries for the targets
# declared in [workspace.metadata.dist] and uploads them to a GitHub Release.
#
# Tag a release with `git tag v0.x.y && git push --tags` to trigger.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross (linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p tokenlens-core --bin tokenlens
      - name: Build (native)
        if: ${{ !matrix.cross }}
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p tokenlens-core --bin tokenlens
      - name: Package archive
        shell: bash
        run: |
          name="tokenlens-${{ matrix.target }}"
          mkdir -p "dist/$name"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/tokenlens.exe" "dist/$name/"
          else
            cp "target/${{ matrix.target }}/release/tokenlens" "dist/$name/"
          fi
          cp -r hooks scripts/install.sh README.md LICENSE "dist/$name/" || true
          cd dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "$name.zip" "$name"
          else
            tar -czf "$name.tar.gz" "$name"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Compute checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || true
          cat SHA256SUMS
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*.tar.gz dist/*.zip dist/SHA256SUMS || \
          gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz dist/*.zip dist/SHA256SUMS --clobber
